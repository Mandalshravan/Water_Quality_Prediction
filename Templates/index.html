<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Water Quality Prediction</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='styles.css') }}"
    />
  </head>
  <body>
    <main class="page">
      <div class="card">
        <header class="card-header">
          <h1>Water Quality Prediction</h1>
          <p class="lead">
            Enter the sample measurements to predict potability
          </p>
        </header>

        <form action="/predict_waterQ" method="POST" class="form">
          <div class="grid">
            <div class="field full">
              <label for="ph">pH</label>
              <input
                type="number"
                id="ph"
                name="ph"
                placeholder="e.g. 7.2"
                step="0.01"
                required
              />
            </div>

            <div class="field">
              <label for="hardness">Hardness</label>
              <input
                type="number"
                id="hardness"
                name="hardness"
                placeholder="e.g. 200"
                step="0.01"
                required
              />
            </div>

            <div class="field">
              <label for="solids">Solids (TDS)</label>
              <input
                type="number"
                id="solids"
                name="solids"
                placeholder="e.g. 30000"
                step="0.01"
                required
              />
            </div>

            <div class="field">
              <label for="chloramines">Chloramines</label>
              <input
                type="number"
                id="chloramines"
                name="chloramines"
                placeholder="e.g. 7.0"
                step="0.01"
                required
              />
            </div>

            <div class="field">
              <label for="sulfate">Sulfate</label>
              <input
                type="number"
                id="sulfate"
                name="sulfate"
                placeholder="e.g. 200"
                step="0.01"
                required
              />
            </div>

            <div class="field">
              <label for="conductivity">Conductivity</label>
              <input
                type="number"
                id="conductivity"
                name="conductivity"
                placeholder="e.g. 400"
                step="0.01"
                required
              />
            </div>

            <div class="field">
              <label for="organicCarbon">Organic Carbon</label>
              <input
                type="number"
                id="organicCarbon"
                name="organicCarbon"
                placeholder="e.g. 10"
                step="0.01"
                required
              />
            </div>

            <div class="field">
              <label for="trihalomethanes">Trihalomethanes</label>
              <input
                type="number"
                id="trihalomethanes"
                name="trihalomethanes"
                placeholder="e.g. 80"
                step="0.01"
                required
              />
            </div>

            <div class="field">
              <label for="turbidity">Turbidity</label>
              <input
                type="number"
                id="turbidity"
                name="turbidity"
                placeholder="e.g. 2"
                step="0.01"
                required
              />
            </div>
          </div>

          <div class="actions">
            <button type="submit" class="btn-primary">
              Predict Water Quality
            </button>
          </div>

          <p class="note">
            Tip: Use realistic sensor values for best predictions.
          </p>
        </form>
      </div>
    </main>
  </body>
</html>
